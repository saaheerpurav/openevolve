# TDES-FPGA — full system configuration.
#
# Ablation conditions are selected at runtime via --conditions (the controller
# toggles mechanisms; see openevolve/tdes/fpga/ablation.py), so this single
# config drives every condition. The sibling config files differ only in
# documentation / convenience defaults.
#
# Real runs need an LLM key:
#   export OPENAI_API_KEY=...
#   python -m openevolve.tdes.fpga.experiments.ablation \
#       --benchmark rtllm --designs adder_8bit multi_16bit \
#       --config openevolve/tdes/fpga/experiments/configs/tdes_full.yaml

tdes:
  pop_size: 5
  max_generations: 5
  window_size: 3
  diff_based: false        # full module rewrites are more reliable for Verilog
  suite_timeout: 120
  synth_target: ice40
  output_dir: tdes_fpga_results/runs
  random_seed: 42

llm:
  api_base: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.8
  max_tokens: 4096
  models:
    - name: "gpt-4o"
      weight: 1.0

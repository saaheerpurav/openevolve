# TDES-Repair campaign config: Haiku 4.5 via Anthropic's OpenAI-compatible endpoint.
#   set ANTHROPIC_API_KEY, then:
#   python -m openevolve.tdes.repair.experiments.run_campaign --pilot
#   python -m openevolve.tdes.repair.experiments.run_campaign --full

tdes:
  pop_size: 8
  max_generations: 6
  window_size: 3
  diff_based: false                 # full module rewrites; the modules are small
  sandbox: true
  suite_timeout: 60
  # One module fixed per candidate per generation — the regime in which a single
  # lineage cannot fix every module alone, so crossover earns its keep (same
  # setting as the FPGA crossover experiments). Applies to all evolutionary
  # conditions equally.
  mutate_modules_per_candidate: 1
  output_dir: tdes_repair_results/runs
  random_seed: 42

llm:
  api_base: "https://api.anthropic.com/v1/"
  api_key: "${ANTHROPIC_API_KEY}"
  temperature: 0.8
  max_tokens: 4096
  timeout: 120
  retries: 3
  models:
    - name: "claude-haiku-4-5-20251001"
      weight: 1.0
